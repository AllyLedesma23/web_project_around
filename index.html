<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Página interactiva para agregar, eliminar o dar 'me gusta'a fotos"
    />
    <meta name="author" content="Paula Vargas" />
    <meta name="keywords" content="HTML, CSS, JS" />
    <title>Alrededor de los EE.UU.</title>
    <link rel="stylesheet" href="./page/index.css" />
  </head>
  <body>
    <div class="page">
      <header class="header">
        <img
          src="images/Vector.svg"
          alt="Logo de página"
          class="header__image"
        />
      </header>
      <main class="main">
        <div class="main__profile">
          <div class="main__content-image">
            <img
              src="./images/avatar.jpg"
              alt="Foto de perfil"
              class="main__profile-image"
            />
          </div>

          <div class="main__content-info">
            <p class="main__info main__info_name">Jacques Cousteau</p>
            <p class="main__info main__info_profession">Explorador</p>
            <button type="button" class="main__button main__button_edit">
              &#x1F58C;
            </button>
          </div>

          <button type="button" class="main__button main__button_add">+</button>
        </div>

        <div class="main__gallery">
          <div class="main__gallery-card">
            <img
              class="main__gallery-image"
              src="./images/photo1.jpg"
              alt="Glacial-carved canyon"
            />

            <div class="main__gallery-content">
              <p class="main__gallery-paragraph">Valle de Yosemite</p>
              <button
                type="button"
                class="main__button main__button_like"
              ></button>
            </div>
          </div>

          <div class="main__gallery-card">
            <img
              class="main__gallery-image"
              src="./images/photo2.jpg"
              alt="Turquoise alpine lake"
            />

            <div class="main__gallery-content">
              <p class="main__gallery-paragraph">Lago Louise</p>
              <button
                type="button"
                class="main__button main__button_like"
              ></button>
            </div>
          </div>

          <div class="main__gallery-card">
            <img
              class="main__gallery-image"
              src="./images/photo3.jpg"
              alt="Mountain range"
            />

            <div class="main__gallery-content">
              <p class="main__gallery-paragraph">Montañas Calvas</p>
              <button
                type="button"
                class="main__button main__button_like"
              ></button>
            </div>
          </div>

          <div class="main__gallery-card">
            <img
              class="main__gallery-image"
              src="./images/photo4.jpg"
              alt="Horseshoe-shaped mountain group"
            />

            <div class="main__gallery-content">
              <p class="main__gallery-paragraph">Latemar</p>
              <button
                type="button"
                class="main__button main__button_like"
              ></button>
            </div>
          </div>

          <div class="main__gallery-card">
            <img
              class="main__gallery-image"
              src="./images/photo5.jpg"
              alt="High-mountain terrain"
            />

            <div class="main__gallery-content">
              <p class="main__gallery-paragraph">Vanoise National Park</p>
              <button
                type="button"
                class="main__button main__button_like"
              ></button>
            </div>
          </div>

          <div class="main__gallery-card">
            <img
              class="main__gallery-image"
              src="./images/photo6.jpg"
              alt="Emerald-green alpine lake"
            />

            <div class="main__gallery-content">
              <p class="main__gallery-paragraph">Lago di Braies</p>
              <button
                type="button"
                class="main__button main__button_like"
              ></button>
            </div>
          </div>
        </div>
      </main>
      <footer class="footer">
        <p class="footer__copyright">&#x00a9; 2026 Around The U.S.</p>
      </footer>
    </div>
    <div class="popup">
      <div class="popup__container">
        <button
          type="button"
          class="popup__button popup__button_close"
        ></button>

        <form class="popup__form popup__form-edit" novalidate>
          <h2 class="popup__subtitle">Editar perfil</h2>

          <fieldset class="popup__content">
            <label class="popup__field"
              ><input
                type="text"
                class="popup__input popup__input_name"
                placeholder="Nombre"
                id="name-input"
                minlength="2"
                maxlength="40"
                required
              />
            </label>

            <label class="popup__field">
              <input
                type="text"
                class="popup__input popup__input_about"
                placeholder="Acerca de mí"
                id="about-input"
                minlength="2"
                maxlength="200"
                required
              />
            </label>
          </fieldset>

          <button
            type="submit"
            class="popup__button popup__button_save popup__button_disabled"
            disabled
          >
            Guardar
          </button>
        </form>
      </div>
    </div>
    <script src="./page/index.js"></script>
  </body>
</html>
